# Render Blueprint — deploys both apps/api and apps/web as Docker web
# services on Render's free plan. Render is the only production platform
# for this project (docs/reports/ARCHITECTURE_VERIFICATION.md verified no
# code-level dependency on Vercel exists — both apps already ship a
# Dockerfile/start.sh that work identically on any Docker host).
#
# Database: any PostgreSQL instance you provision yourself (Supabase,
# Render's own managed Postgres, Neon, RDS, etc.) — paste its connection
# string into DATABASE_URL below. This app has no dependency on any
# specific Postgres provider or SDK; DATABASE_URL is the only thing that
# matters (see apps/api/prisma/schema.prisma's datasource block).
#
# ordervora-web reaches ordervora-api over its public HTTPS endpoint, not
# Render's private network — free-tier web services can send private
# network requests but cannot receive them (render.com/docs/private-network,
# render.com/docs/free), so ordervora-api (plan: free) is unreachable via
# fromService/hostport regardless of correct resolution. This was
# confirmed via a live deploy that produced zero requests at ordervora-api
# despite correct config. ordervora-api's FRONTEND_URL still needs one
# manual paste after the first deploy (see that variable's own comment
# below) — Render has no "resolve after both services exist" mechanism
# for either direction once a public URL is involved.
#
# Deploy: render.com -> New -> Blueprint -> select this repo -> pick the
# correct branch explicitly from the branch dropdown (do not accept
# whatever branch the picker defaults to) -> Apply. Render will prompt
# for every `sync: false` value below — see docs/runbooks/environment-configuration.md
# and apps/api/.env.example / apps/web/.env.example for what each one is
# and how to generate it. Full field-by-field detail:
# docs/reports/RENDER_BLUEPRINT_FINAL.md.

services:
  - type: web
    name: ordervora-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    # No preDeployCommand: migrations + the idempotent beta seed now run
    # inside apps/api/scripts/start.sh itself (the container's own
    # entrypoint), not via a Render-specific hook — so this exact image
    # deploys identically on any Docker host, not just Render.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      # The new PostgreSQL database's connection string (see the note at
      # the top of this file). sync: false means Render asks for this
      # once and never stores it in git — required since this repo is
      # public.
      - key: DATABASE_URL
        sync: false
      # ordervora-web's own URL (e.g. https://ordervora-web.onrender.com),
      # or your final production domain once one is attached. sync: false
      # — not a secret, but its real value isn't known until ordervora-web
      # below has completed its first deploy, so it can't be a literal in
      # this file (both services are declared in the same Apply, and
      # Render doesn't resolve a service's own assigned URL as a
      # fromService target for a sibling service in the same blueprint
      # run). Paste ordervora-web's URL here once, after both services
      # exist — see docs/reports/RENDER_BLUEPRINT_FINAL.md's deployment
      # order.
      - key: FRONTEND_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      # generateValue produces a base64 value, but this app validates
      # COMMERCE_ENCRYPTION_KEY against a 64-char-hex regex at startup, so
      # generateValue can't be used here. It's also a real secret, so —
      # like DATABASE_URL/FRONTEND_URL above — it must not be a literal
      # in this public repo either: sync: false, generate with
      # `openssl rand -hex 32` and paste the result when Render prompts.
      - key: COMMERCE_ENCRYPTION_KEY
        sync: false
      # Bootstraps the single platform ADMIN account on first boot (see
      # apps/api/prisma/seed.ts) — required for the seed step in
      # start.sh to succeed. Never exposed through any HTTP endpoint.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      # Transactional order emails (nodemailer/SMTP — works with Resend's
      # SMTP relay, or any other SMTP provider). Required for email to
      # send at all; see apps/api/.env.example for detail on each field.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_ADDRESS
        sync: false
      # At least one AI provider key is required for AI features (menu
      # import, brand analysis, content generation, the Brand Consistency
      # judge) — priority order OpenAI, then Anthropic, then Gemini; set
      # only the one(s) you're using. Leave the unused ones out of the
      # Render dashboard entirely rather than setting them to a placeholder.
      - key: OPENAI_API_KEY
        sync: false
      # Required only if you want Google Maps (Places API) import live.
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      # Hostname suffix used by custom-domain CNAME verification (see
      # apps/api/src/modules/sites/domain.service.ts). Set this to a
      # domain/subdomain you control before relying on the custom-domain
      # feature.
      - key: SITE_PLATFORM_DOMAIN
        sync: false

  - type: web
    name: ordervora-web
    runtime: docker
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    # No dedicated /health route exists in apps/web (it's a Next.js app,
    # not an API) — "/" is a statically prerendered page, matching
    # apps/web/Dockerfile's own Docker-level HEALTHCHECK, which already
    # targets the same path.
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Points at ordervora-api's public HTTPS endpoint, not Render's
      # private network. Confirmed (not assumed) via Render's own docs:
      # free-tier web services can SEND private-network requests but
      # cannot RECEIVE them (render.com/docs/private-network,
      # render.com/docs/free) — ordervora-api is plan: free, so it is
      # architecturally unreachable over fromService/hostport regardless
      # of correct resolution. This is the intended production routing
      # for two free-tier services, not a workaround; it only changes if
      # ordervora-api is ever upgraded off the free plan. Render forwards
      # every Docker-service envVar as a build ARG automatically when the
      # Dockerfile declares a matching ARG name (both are declared in
      # apps/web/Dockerfile) — so this reaches next.config.ts's
      # build-time rewrite manifest AND (via the Dockerfile's own
      # runtime-stage ENV computed from the same two ARGs) the running
      # container's process.env.API_URL that lib/server-api.ts reads.
      - key: API_URL_SCHEME
        value: https
      - key: API_HOST
        value: ordervora-api-2gkw.onrender.com
      # Public marketing-site origin, used for sitemap.xml/robots.txt/OG
      # tags (apps/web/src/app/{sitemap,robots}.ts). sync: false — set
      # this to your real production domain, or leave it as
      # ordervora-web's own Render-assigned URL if you don't have a
      # custom domain yet. Build-time only, like API_URL_SCHEME/API_HOST
      # above — Next.js inlines every NEXT_PUBLIC_* reference at `next
      # build` time.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
